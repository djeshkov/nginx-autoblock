# nginx-autoblock — server-level block check
# Include this INSIDE your server { } block (or top-level if global).
#
# Returns 444 (close connection without response) — cheaper than 403 because
# nginx never sends a response body, and the bot doesn't learn it was blocked.
#
# Note: nginx's "if" is generally discouraged, but `return` is one of the
# explicitly-supported safe uses per nginx docs.

if ($blocked_subnet) {
    return 444;
}
