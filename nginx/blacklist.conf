# nginx-autoblock — block-list mechanism
# Include this from /etc/nginx/conf.d/ (loaded at http context).
#
# Defines $blocked_subnet variable:
#   1 → IP / subnet is on the block-list (return 444 from server config)
#   0 → not blocked
#
# The variable aggregates three independent block sources, all maintained by
# the autoblock script:
#
#   - /etc/nginx/blocked-subnets.conf      — subnet pass output (/24 CIDRs)
#   - /etc/nginx/blocked-ips.conf          — per-IP pass output (/32 entries)
#   - /etc/nginx/blocked-ua-clusters.conf  — UA-cluster pass output (/32 entries)
#
# All files are optional. The geo block degrades gracefully when any is
# missing (nginx logs a warning on reload but continues). To use only some
# passes, leave the corresponding file absent or comment out the include.
#
# Each line in all files follows the same nginx geo format:
#     <CIDR-or-IP> 1;

geo $blocked_subnet {
    default 0;
    include /etc/nginx/blocked-subnets.conf;
    include /etc/nginx/blocked-ips.conf;
    include /etc/nginx/blocked-ua-clusters.conf;
}
