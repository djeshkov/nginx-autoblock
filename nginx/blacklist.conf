# nginx-autoblock — block-list mechanism
# Include this from /etc/nginx/conf.d/ (loaded at http context).
#
# Defines $blocked_subnet variable:
#   1 → IP / subnet is on the block-list (return 444 from server config)
#   0 → not blocked
#
# The variable aggregates two independent block sources, both maintained by
# the autoblock script:
#
#   - /etc/nginx/blocked-subnets.conf   — v5 subnet pass output (/24 CIDRs)
#   - /etc/nginx/blocked-ips.conf       — v6 per-IP pass output (/32 entries)
#
# Both files are optional. The geo block degrades gracefully when either is
# missing (nginx logs a warning on reload but continues). To use only one
# pass, leave the corresponding file absent or comment out the include.
#
# Each line in both files follows the same nginx geo format:
#     <CIDR-or-IP> 1;

geo $blocked_subnet {
    default 0;
    include /etc/nginx/blocked-subnets.conf;
    include /etc/nginx/blocked-ips.conf;
}
