# nginx-autoblock — block-list mechanism
# Include this from /etc/nginx/conf.d/ (loaded at http context).
#
# Defines $blocked_subnet variable:
#   1 → subnet is blocked (return 444 from server config)
#   0 → not blocked
#
# Data file /etc/nginx/blocked-subnets.conf is maintained by the autoblock
# script. Each line: <CIDR> 1;

geo $blocked_subnet {
    default 0;
    include /etc/nginx/blocked-subnets.conf;
}
